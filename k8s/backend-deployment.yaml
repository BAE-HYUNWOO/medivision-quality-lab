apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: medivision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: medivision-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE_URL
              value: "http://model-service:8000"
            - name: ALLOWED_ORIGINS
              value: "http://localhost:5173,http://localhost:3000,http://frontend-service"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: medivision
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
